<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Manager | MongoDB & Django</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar {
        margin-bottom: 30px;
      }
      .card {
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .status-available {
        color: green;
        font-weight: bold;
      }
      .status-borrowed {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Library System Admin</a>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <!-- Sidebar / Add Book Form -->
        <div class="col-md-4">
          <div class="card p-4">
            <h4 id="formTitle">Add New Book</h4>
            <hr />
            <div class="mb-3">
              <label class="form-label">Book Title</label>
              <input
                type="text"
                id="bookTitle"
                class="form-control"
                placeholder="e.g. Harry Potter"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Author</label>
              <input
                type="text"
                id="bookAuthor"
                class="form-control"
                placeholder="e.g. J.K. Rowling"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">ISBN</label>
              <input
                type="text"
                id="bookIsbn"
                class="form-control"
                placeholder="13-digit code"
              />
            </div>
            <input type="hidden" id="bookId" />
            <!-- Hidden field for updates -->
            <button
              class="btn btn-success w-100"
              id="saveBtn"
              onclick="handleSave()"
            >
              Save Book
            </button>
            <button
              class="btn btn-secondary w-100 mt-2 d-none"
              id="cancelBtn"
              onclick="resetForm()"
            >
              Cancel Edit
            </button>
          </div>
        </div>

        <!-- Main Content / List -->
        <div class="col-md-8">
          <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h4>Book Inventory</h4>
              <div class="input-group w-50">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control"
                  placeholder="Search title/author..."
                />
                <button class="btn btn-outline-primary" onclick="loadBooks()">
                  Search
                </button>
              </div>
            </div>

            <table class="table table-hover">
              <thead class="table-light">
                <tr>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="bookList">
                <!-- Data will be injected here by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
      const API_URL = "http://127.0.0.1:8000/api/books/"; // CORRECT (Matches your urls.py)

      // 1. LOAD & SEARCH BOOKS
      async function loadBooks() {
        const searchTerm = document.getElementById("searchInput").value;
        const url = searchTerm ? `${API_URL}?search=${searchTerm}` : API_URL;

        try {
          const response = await fetch(url);
          const books = await response.json();

          const listBody = document.getElementById("bookList");
          listBody.innerHTML = ""; // Clear current list

          books.forEach((book) => {
            listBody.innerHTML += `
                <tr>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td>
                        <span class="${book.available ? "status-available" : "status-borrowed"}">
                            ${book.available ? "Available" : "Borrowed"}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-info text-white" onclick="editBook('${book._id}', '${book.title}', '${book.author}', '${book.isbn}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteBook('${book._id}')">Delete</button>
                    </td>
                </tr>
            `;
          });
        } catch (err) {
          console.error("Error loading books:", err);
        }
      }

      // 2. CREATE OR UPDATE BOOK
      async function handleSave() {
        const id = document.getElementById("bookId").value;
        const data = {
          title: document.getElementById("bookTitle").value,
          author: document.getElementById("bookAuthor").value,
          isbn: document.getElementById("bookIsbn").value,
          available: true, // Default for new books
        };

        if (!data.title || !data.author)
          return alert("Title and Author are required!");

        let method = "POST";
        let url = API_URL;

        // If ID exists, we are UPDATING (PUT)
        if (id) {
          method = "PUT";
          url = `${API_URL}${id}/`;
        }

        const response = await fetch(url, {
          method: method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (response.ok) {
          resetForm();
          loadBooks();
        } else {
          alert("Operation failed. Check console.");
        }
      }

      // 3. DELETE BOOK
      async function deleteBook(id) {
        if (confirm("Are you sure you want to delete this book?")) {
          await fetch(`${API_URL}${id}/`, { method: "DELETE" });
          loadBooks();
        }
      }

      // 4. UI HELPER FUNCTIONS
      function editBook(id, title, author, isbn) {
        document.getElementById("formTitle").innerText = "Edit Book";
        document.getElementById("bookId").value = id;
        document.getElementById("bookTitle").value = title;
        document.getElementById("bookAuthor").value = author;
        document.getElementById("bookIsbn").value = isbn;

        document.getElementById("cancelBtn").classList.remove("d-none");
        document.getElementById("saveBtn").className = "btn btn-primary w-100";
      }

      function resetForm() {
        document.getElementById("formTitle").innerText = "Add New Book";
        document.getElementById("bookId").value = "";
        document.getElementById("bookTitle").value = "";
        document.getElementById("bookAuthor").value = "";
        document.getElementById("bookIsbn").value = "";

        document.getElementById("cancelBtn").classList.add("d-none");
        document.getElementById("saveBtn").className = "btn btn-success w-100";
      }

      // Initial Load
      loadBooks();
    </script>
  </body>
</html>
