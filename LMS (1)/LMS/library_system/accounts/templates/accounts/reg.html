<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library System - Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: url("https://wallpapers.com/images/hd/cool-contemporary-library-51rw7uhoqb006ytg.jpg")
          center no-repeat fixed;
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .reg-container {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }
      h3 {
        color: #333;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="reg-container">
      <h3 class="text-center mb-4">Create Account</h3>
      <form id="regForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Choose a username"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="email@example.com"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select id="role" class="form-select">
            <option value="user">User (Borrower)</option>
            <option value="employee">Employee (Staff)</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          Sign Up
        </button>
      </form>
      <div class="text-center mt-3">
        <span>Already have an account? </span
        ><a href="/login/" class="text-decoration-none">Login here</a>
      </div>
    </div>

    <script>
      document
        .getElementById("regForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = {
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
          };

          try {
            // Matches your path: path('api/register/', acc_views.register_user)
            const response = await fetch("/api/register/", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(formData),
            });

            const result = await response.json();

            if (response.status === 201) {
              alert("Registration Successful! Now please login.");
              window.location.href = "/login/"; // Redirect to your login view
            } else {
              alert("Error: " + JSON.stringify(result));
            }
          } catch (error) {
            alert("Server connection failed. Is Django running?");
          }
        });
    </script>
  </body>
</html>
