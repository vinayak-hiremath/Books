<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library System - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: url("https://wallpapers.com/images/hd/cool-contemporary-library-51rw7uhoqb006ytg.jpg")
          center no-repeat fixed;
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .log-container {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }
      h3 {
        color: #222;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="log-container">
      <h3 class="text-center mb-4">Library Login</h3>
      <form id="logForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Enter username"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter password"
            required
          />
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">Login</button>
      </form>
      <div class="text-center mt-3">
        <span>Need an account? </span
        ><a href="/register/" class="text-decoration-none">Register here</a>
      </div>
    </div>

    <script>
      document
        .getElementById("logForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const loginData = {
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          };

          try {
            // Matches your path: path('api/login/', acc_views.login_user)
            const response = await fetch("/api/login/", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(loginData),
            });

            const result = await response.json();

            if (response.ok) {
              // Save user details to browser storage
              localStorage.setItem("userRole", result.role);
              localStorage.setItem("username", result.username);
              localStorage.setItem("userId", result.id);

              alert("Login successful! Redirecting to Home...");
              window.location.href = "/"; // Redirects to path('', inv_views.home)
            } else {
              alert(
                "Login Failed: " +
                  (result.error || "Invalid username or password"),
              );
            }
          } catch (error) {
            alert("Error connecting to the API.");
          }
        });
    </script>
  </body>
</html>
